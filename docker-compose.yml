networks:
  skonadesk:
    name: skonadesk
    external: false

services:
  hbbs:
    container_name: skonadesk-hbbs
    image: ghcr.io/skonamonkey/skonadesk-hbbs:latest
    command: -r ${RELAY_HOST}:21117 -k _
    ports:
      - "21115:21115"
      - "21116:21116"
      - "21116:21116/udp"
      - "21118:21118"
    environment:
      - RELAY_JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./data:/data
    networks:
      - skonadesk
    restart: unless-stopped
    depends_on:
      - hbbr

  hbbr:
    container_name: skonadesk-hbbr
    image: rustdesk/rustdesk-server:1.1.15
    command: hbbr -k _
    ports:
      - "21117:21117"
      - "21119:21119"
    volumes:
      - ./data:/root
    networks:
      - skonadesk
    restart: unless-stopped

  api:
    container_name: skonadesk-api
    image: ghcr.io/skonamonkey/skonadesk-api:latest
    ports:
      - "21114:21114"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - TOKEN_EXPIRY=${TOKEN_EXPIRY:-365d}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
      - DB_PATH=${DB_PATH}
      - PORT=${PORT}
      - DOMAIN=${DOMAIN}
    volumes:
      - ./data:/data
    networks:
      - skonadesk
    restart: unless-stopped
    depends_on:
      - hbbs

  dashboard:
    container_name: skonadesk-dashboard
    image: ghcr.io/skonamonkey/skonadesk-dashboard:latest
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    environment:
      - API_URL=http://skonadesk-api:21114
      - APP_SECRET=${APP_SECRET}
      - DATA_PATH=/data
      - API_PUBLIC_URL=${API_PUBLIC_URL:-}
    volumes:
      - ./data:/data:ro
    networks:
      - skonadesk
    restart: unless-stopped
    depends_on:
      - api
